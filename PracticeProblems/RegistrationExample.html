<!DOCTYPE html>
<html>
<head>
    <title>Registration Example</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            margin-top:50px;
        }

        .container{
            width:800px;
            border:2px solid #555;
            border-radius:10px;
            display:flex;
        }

        .left,.right{
            flex:1;
            padding:20px;
        }

        .left{
            border-right:2px solid #555;
        }

        h2{
            text-align:center;
        }

        label{
            display:inline-block;
            width:100px;
            margin-bottom:15px;
            font-weight:bold;
        }

        input{
            width:180px;
            padding:5px;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:8px 20px;
            cursor:pointer;
            margin-left:105px;
        }

        .details p{
            font-size:20px;
            margin:20px 0;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="left">
        <h2>Registration</h2>

        <label>User Name</label>
        <input type="text" id="uname"><br>

        <label>Mobile</label>
        <input type="text" id="mobile"><br>

        <label>Email</label>
        <input type="email" id="email"><br>

        <label>Address</label>
        <input type="text" id="address"><br><br>

        <button onclick="registerUser()">Register</button>
    </div>

    <div class="right">
        <h2>Details</h2>

        <div class="details">
            <p><b>User Name:</b> <span id="showName"></span></p>
            <p><b>Mobile:</b> <span id="showMobile"></span></p>
            <p><b>Email:</b> <span id="showEmail"></span></p>
            <p><b>Address:</b> <span id="showAddress"></span></p>
        </div>
    </div>

</div>

<script>
function registerUser(){

    document.getElementById("showName").innerHTML =
        document.getElementById("uname").value;

    document.getElementById("showMobile").innerHTML =
        document.getElementById("mobile").value;

    document.getElementById("showEmail").innerHTML =
        document.getElementById("email").value;

    document.getElementById("showAddress").innerHTML =
        document.getElementById("address").value;
}
</script>

</body>
</html>
