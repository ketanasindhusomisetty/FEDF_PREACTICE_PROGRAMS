<!DOCTYPE html>
<html>
<head>
  <title>Employee Details</title>
</head>
<body>

<h2>Employee Information</h2>

<button onclick="showEmployee()">Show Employee</button>

<p id="output"></p>

<script>

  // STEP 1: Create employee object
  const employee = {
    name: "Rahul",
    salary: 50000,
    department: "IT"
  };

  // STEP 2: Function to display details
  const showEmployee = () => {

    // STEP 3: Object destructuring
    const { name, salary } = employee;

    // STEP 4: Display using template literals
    document.getElementById("output").innerHTML =
      `Employee Name: ${name} <br> Salary: ${salary}`;
  };

</script>

</body>
</html>
