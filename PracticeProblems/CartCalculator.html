<!DOCTYPE html>
<html>
<head>
  <title>Shopping Cart Total</title>
</head>
<body>

<h2>Shopping Cart</h2>

<button onclick="calculateTotal()">Calculate Total</button>

<div id="output"></div>

<script>

  // STEP 1: Create cart items
  const cart = [
    { name: "Laptop", price: 50000 },
    { name: "Mouse", price: 500 },
    { name: "Keyboard", price: 1500 }
  ];

  // STEP 2: Arrow function to calculate total price
  const getTotalPrice = () => {
    return cart.reduce((total, item) => total + item.price, 0);
  };

  // STEP 3: Display cart details and total
  const calculateTotal = () => {

    let result = "";

    cart.forEach(({ name, price }) => {
      result += `<p>Product: ${name}, Price: ${price}</p>`;
    });

    result += `<h3>Total Price: ${getTotalPrice()}</h3>`;

    document.getElementById("output").innerHTML = result;
  };

</script>

</body>
</html>
